      <stop offset="0" stop-color="#1c4670" />
      <stop offset="1" stop-color="#5ea4df" />
    </linearGradient>
    <linearGradient id="sun" x1="31" y1="26" x2="57" y2="52" gradientUnits="userSpaceOnUse">
