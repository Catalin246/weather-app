<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Weather Dashboard Icon</title>
  <desc id="desc">A rounded blue tile with a sun, cloud, and wave line.</desc>
  <defs>
